{% set version = "1.13" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-venn
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/venn_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/venn/venn_{{ version }}.tar.gz
  sha256: 51aaf8ff4e781940f4778197a31db71fe20c9c887e39273c1ca119aa8a8e2e9e

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-admisc >=0.33
  run:
    - r-base
    - r-admisc >=0.33

test:
  commands:
    - $R -e "library('venn')"           # [not win]
    - "\"%R%\" -e \"library('venn')\""  # [win]

about:
  home: https://github.com/dusadrian/venn
  license: GPL-3.0-or-later
  summary: A close to zero dependency package to draw and display Venn diagrams up to 7 sets, and any Boolean union of set intersections.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
